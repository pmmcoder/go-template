app:
  name: my_project
  env: dev
  port: 8080

logger:
  level: debug
  format: json
  add_source: true
  rotation:
    filename: logs/app.log
    max_size: 50
    max_age: 10
    max_backups: 50
    compress: true

db:
  dsn: postgres://postgres:postgres@localhost:5432/my_project?sslmode=disable
  max_open_conns: 25
  max_idle_conns: 5

queue:
  max_workers: 10
  poll_time: 5

cache:
  addr: localhost:6379
  password: ""
  db: 0
